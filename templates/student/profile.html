<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>👤 My Profile — FaceAttend Pro</title><link rel="stylesheet" href="/static/css/style.css"/></head><body>
<div class="wrap">
<aside class="sidebar">
  <div class="sb-logo"><div class="title">🎓 FaceAttend Pro</div><div class="sub">Student Portal</div>
    <div class="user">{{ name }}</div><div class="role-badge">🎓 Student</div></div>
  <div class="nav-sec">Main</div>
  <a class="nav-link " href="/student/dashboard"><span class="nav-icon">🏠</span>Dashboard</a>
  <a class="nav-link " href="/student/register-face"><span class="nav-icon">📷</span>Register Face</a>
  <a class="nav-link " href="/student/scan"><span class="nav-icon">👁</span>Scan Attendance</a>
  <a class="nav-link " href="/student/attendance"><span class="nav-icon">📋</span>My Attendance</a>
  <a class="nav-link " href="/student/leaves"><span class="nav-icon">🏖</span>Leave Requests</a>
  <a class="nav-link active" href="/student/profile"><span class="nav-icon">👤</span>My Profile</a>
  <div class="sb-footer"><a class="logout-btn" href="/logout">🚪 Logout</a></div>
</aside>
<main class="content">
<div class="topbar"><div class="topbar-title">👤 My Profile</div>
  <div id="topExtra" class="ml-auto flex gap-8"></div>
  <button class="bell-btn" onclick="openNotifModal()" style="margin-left:8px">🔔<span class="notif-dot" id="notifDot" style="display:none">0</span></button>
</div>
<div id="mainArea"><div class="empty"><div class="empty-icon">⏳</div><p>Loading…</p></div></div>
</main></div>
<div class="modal-bg" id="m1" onclick="bgClose(event,'m1')"><div class="modal"><div class="modal-hdr"><h3 id="mTitle"></h3><button class="btn btn-ghost btn-sm" onclick="closeModal('m1')">✕</button></div><div id="mBody"></div></div></div>
<div class="modal-bg" id="m2" onclick="bgClose(event,'m2')"><div class="modal" style="max-width:680px"><div class="modal-hdr"><h3 id="mTitle2"></h3><button class="btn btn-ghost btn-sm" onclick="closeModal('m2')">✕</button></div><div id="mBody2" style="max-height:60vh;overflow-y:auto"></div></div></div>
<div class="modal-bg" id="notifModal" onclick="bgClose(event,'notifModal')">
  <div class="modal"><div class="modal-hdr"><h3>🔔 Notifications</h3>
    <div class="flex gap-8">
      <button class="btn btn-ghost btn-sm" onclick="api.post('/api/notifications/read-all',{}).then(()=>openNotifModal())">Read all</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('notifModal')">✕</button></div></div>
    <div id="notifList"></div></div>
</div>

<div id="toast" class="toast"></div>
<script src="/static/js/shared.js"></script>
<script>
const UID='{{ tid if tid is defined else sid if sid is defined else "" }}';
async function openNotifModal(){await renderNotifModal(UID);openModal('notifModal');}

async function boot(){
  const me=await api.get('/api/me');
  document.getElementById('mainArea').innerHTML=`<div style="max-width:520px">
    <div class="card mb-14">
      <div class="flex gap-14 mb-16">
        <div style="width:72px;height:72px;border-radius:50%;overflow:hidden;border:3px solid var(--acc);flex-shrink:0;background:var(--accl);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:var(--acc)">
          ${me.photo?`<img src="${me.photo}" style="width:100%;height:100%;object-fit:cover"/>`:me.name?me.name[0]:'?'}</div>
        <div><div style="font-size:18px;font-weight:800">${esc(me.name||'')}</div>
          <div style="font-size:13px;color:var(--mut)">${esc(me.rollNo||'')} · ${esc(me.department||'')} · Year ${me.year}</div>
          <div style="font-size:12px;color:var(--dim)">${esc(me.email||'')}</div>
          <span class="badge ${me.faceRegistered?'b-approved':'b-absent'}" style="margin-top:6px">${me.faceRegistered?'✓ Face Registered':'✗ No Face Registered'}</span>
        </div>
      </div>
      <div class="form-group"><label>Full Name</label><input id="pN" value="${esc(me.name||'')}"/></div>
      <div class="form-group"><label>Phone</label><input id="pPh" value="${esc(me.phone||'')}"/></div>
      <p style="font-size:11px;color:var(--mut);margin-top:4px">Note: Email, Roll No, Department and Year can only be changed by admin/teacher.</p>
    </div>
    <div class="card mb-14">
      <div class="card-title">🔐 Change Password</div>
      <div class="form-group"><label>Current Password</label><input id="pCurPass" type="password" placeholder="Current password"/></div>
      <div class="form-group"><label>New Password</label><input id="pNewPass" type="password" placeholder="New password (min 6 characters)"/></div>
    </div>
    <div class="card mb-14"><div class="card-title">🔗 Quick Links</div>
      <div class="flex-col gap-8">
        <a href="/student/register-face" class="btn btn-outline w100">📷 Update Face Photo</a>
        <a href="/student/attendance" class="btn btn-ghost w100">📋 View Attendance</a>
        <a href="/student/leaves" class="btn btn-ghost w100">🏖 My Leave Requests</a>
      </div>
    </div>
    <button class="btn btn-primary w100" onclick="saveP()">💾 Save Profile</button>
  </div>`;
}
async function saveP(){
  const body={name:document.getElementById('pN').value,phone:document.getElementById('pPh').value};
  const newPass=document.getElementById('pNewPass').value;
  if(newPass){
    const curPass=document.getElementById('pCurPass').value;
    if(!curPass){toast('Enter your current password to change it','err');return;}
    body.currentPassword=curPass; body.newPassword=newPass;
  }
  const r=await api.put('/api/students/me/profile',body);
  if(r.ok){
    toast('Profile updated!','ok');
    document.getElementById('pCurPass').value=''; document.getElementById('pNewPass').value='';
  } else toast(r.error||'Failed','err');
}
boot();

</script></body></html>
