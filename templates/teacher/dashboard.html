<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🏠 Teacher Dashboard — FaceAttend Pro</title><link rel="stylesheet" href="/static/css/style.css"/></head><body>
<div class="wrap">
<aside class="sidebar">
  <div class="sb-logo"><div class="title">🎓 FaceAttend Pro</div><div class="sub">Teacher Portal</div>
    <div class="user">{{ name }}</div><div class="role-badge">👨‍🏫 Teacher</div></div>
  <div class="nav-sec">Main</div>
  <a class="nav-link active" href="/teacher/dashboard"><span class="nav-icon">🏠</span>Dashboard</a>
  <a class="nav-link " href="/teacher/sessions"><span class="nav-icon">▶</span>Start Session</a>
  <a class="nav-link " href="/teacher/attendance"><span class="nav-icon">📋</span>Attendance</a>
  <a class="nav-link " href="/teacher/students"><span class="nav-icon">👥</span>My Students</a>
  <div class="nav-sec">Requests</div>
  <a class="nav-link " href="/teacher/leaves"><span class="nav-icon">🏖</span>Leave Requests</a>
  <a class="nav-link " href="/teacher/corrections"><span class="nav-icon">✏</span>Corrections</a>
  <a class="nav-link " href="/teacher/logs"><span class="nav-icon">📝</span>Edit Logs</a>
  <a class="nav-link " href="/teacher/reports"><span class="nav-icon">📊</span>Reports</a>
  <div class="nav-sec">Account</div>
  <a class="nav-link " href="/teacher/profile"><span class="nav-icon">👤</span>My Profile</a>
  <div class="sb-footer"><a class="logout-btn" href="/logout">🚪 Logout</a></div>
</aside>
<main class="content">
<div class="topbar"><div class="topbar-title">🏠 Teacher Dashboard</div>
  <div id="topExtra" class="ml-auto flex gap-8"></div>
  <button class="bell-btn" onclick="openNotifModal()" style="margin-left:8px">🔔<span class="notif-dot" id="notifDot" style="display:none">0</span></button>
</div>
<div id="mainArea"><div class="empty"><div class="empty-icon">⏳</div><p>Loading…</p></div></div>
</main></div>
<div class="modal-bg" id="m1" onclick="bgClose(event,'m1')"><div class="modal"><div class="modal-hdr"><h3 id="mTitle"></h3><button class="btn btn-ghost btn-sm" onclick="closeModal('m1')">✕</button></div><div id="mBody"></div></div></div>
<div class="modal-bg" id="m2" onclick="bgClose(event,'m2')"><div class="modal" style="max-width:680px"><div class="modal-hdr"><h3 id="mTitle2"></h3><button class="btn btn-ghost btn-sm" onclick="closeModal('m2')">✕</button></div><div id="mBody2" style="max-height:60vh;overflow-y:auto"></div></div></div>
<div class="modal-bg" id="notifModal" onclick="bgClose(event,'notifModal')">
  <div class="modal"><div class="modal-hdr"><h3>🔔 Notifications</h3>
    <div class="flex gap-8">
      <button class="btn btn-ghost btn-sm" onclick="api.post('/api/notifications/read-all',{}).then(()=>openNotifModal())">Read all</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('notifModal')">✕</button></div></div>
    <div id="notifList"></div></div>
</div>

<div id="toast" class="toast"></div>
<script src="/static/js/shared.js"></script>
<script>
const UID='{{ tid if tid is defined else sid if sid is defined else "" }}';
async function openNotifModal(){await renderNotifModal(UID);openModal('notifModal');}

async function boot(){
  const [data,subs,active]=await Promise.all([api.get('/api/teacher/analytics'),api.get('/api/subjects'),api.get('/api/sessions/active')]);
  document.getElementById('topExtra').innerHTML='';
  document.getElementById('mainArea').innerHTML=`
    <div class="stats-row" id="sRow"></div>
    <div class="grid2 mb-14">
      <div class="card"><div class="card-title">📈 7-Day Trend</div><canvas id="tc" height="90"></canvas><div id="tl" class="flex mt-6" style="justify-content:space-between"></div></div>
      <div class="card"><div class="card-title">⚡ Quick Actions</div>
        <div class="flex-col gap-8">
          <a href="/teacher/sessions" class="btn btn-success w100">▶ Start New Session</a>
          <a href="/teacher/attendance" class="btn btn-primary w100">📋 View Attendance</a>
          <a href="/teacher/leaves" class="btn btn-outline w100">🏖 Leave Requests</a>
          <a href="/teacher/corrections" class="btn btn-outline w100">✏ Corrections</a>
          <a href="/teacher/reports" class="btn btn-ghost w100">📊 Generate Reports</a>
        </div>
      </div>
    </div>
    <div class="card mb-14"><div class="card-title flex gap-8">🟢 Active Sessions <span class="badge b-approved" id="activeCt">0</span></div><div id="activeSess"></div></div>
    <div class="card"><div class="card-title">📚 My Subjects</div><div class="sub-grid" id="subGrid"></div></div>`;

  document.getElementById('sRow').innerHTML=[
    {l:'My Subjects',v:data.mySubjects,i:'📚',c:'var(--acc)'},
    {l:'Today Sessions',v:data.todaySessions,i:'▶',c:'var(--acc)'},
    {l:'Active Now',v:data.activeSessions,i:'🟢',c:'var(--ok)'},
    {l:'Overall Rate',v:data.overallRate+'%',i:'📈',c:'var(--ok)'},
    {l:'Pending Leaves',v:data.pendingLeaves,i:'🏖',c:'var(--wrn)'},
    {l:'Pending Corrections',v:data.pendingCorrections,i:'✏',c:'var(--wrn)'},
  ].map(s=>`<div class="stat"><div class="stat-icon">${s.i}</div><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('');

  drawTrend('tc','tl',data.trend);

  document.getElementById('activeCt').textContent=active.length;
  document.getElementById('activeSess').innerHTML=active.length?active.map(s=>`<div class="sess-card sess-active flex gap-10 flexwrap">
    <div style="flex:1"><div style="font-weight:700">${esc(s.subjectName)}</div>
      <div style="font-size:11px;color:var(--mut)">Room: ${esc(s.room||'—')} · Started: ${s.startTime} · ${s.durationMinutes}min</div>
      <div style="margin-top:6px">${renderCountdown(s.remainingMinutes)}</div></div>
    <div class="flex gap-8 flexwrap">
      <button class="btn btn-warn btn-sm" onclick="extSess('${s.id}',15)">+15min</button>
      <button class="btn btn-warn btn-sm" onclick="extSess('${s.id}',30)">+30min</button>
      <button class="btn btn-danger btn-sm" onclick="clsSess('${s.id}')">■ Close & Auto-Absent</button>
    </div></div>`).join(''):'<div class="empty" style="padding:14px"><div>📅</div><p>No active sessions — <a href="/teacher/sessions">Start one →</a></p></div>';

  document.getElementById('subGrid').innerHTML=subs.map(s=>`<div class="sub-card" onclick="window.location='/teacher/attendance?sub=${s.id}'">
    <div style="font-weight:700;font-size:14px">${esc(s.name)}</div>
    <div style="font-size:11px;color:var(--mut);margin-bottom:8px">${esc(s.code)} · Sem ${s.semester}</div>
    <div style="font-size:11px;color:var(--acc)">Click to view attendance →</div>
  </div>`).join('');
  loadNotifBadge(UID);
}
async function extSess(id,m){const r=await api.post('/api/sessions/'+id+'/extend',{minutes:m});if(r.ok){toast('Extended '+m+'min','ok');boot();}else toast(r.error||'Failed','err');}
async function clsSess(id){if(!confirm('Close? Unscanned students auto-marked ABSENT.'))return;const r=await api.post('/api/sessions/'+id+'/close',{});if(r.ok){toast('Closed. Auto-absent done.','ok');boot();}else toast('Failed','err');}
boot();setInterval(boot,60000);

</script></body></html>
